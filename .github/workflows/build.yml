    name: Build Kivy APK

    on:
      push:
        branches:
          - main # or your main branch name

    jobs:
      build-apk:
        runs-on: ubuntu-latest # Or another suitable runner

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: 3.12
          - name: Update System
            run: |
              sudo apt-get update
              sudo apt-get install build-essential
              sudo apt-get install libstdc++6
              sudo apt-get install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
              sudo apt-get install -y libgstreamer1.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good
              sudo apt-get install build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev libffi6
              sudo apt-get install libffi-dev

          - name: Install Buildozer
            run: pip install buildozer && pip install setuptools && pip install cython

          - name: Build APK
            run: buildozer android debug # Or 'release' for a signed APK

          - name: Upload APK artifact
            uses: actions/upload-artifact@v4
            with:
              name: Kivy-App-APK
              path: bin/*.apk # Adjust path if your APK is elsewhere
